---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ghost
  namespace: flux-system
spec:
  install:
    disableWait: true
  upgrade:
    disableWait: true
  interval: 30m
  chart:
    spec:
      chart: "ghost"
      version: "19.3.22" # 5.54.0" # Current as of Jul 12, 2023
      sourceRef:
        # bitnami was depoyed with coder
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h
  values: # https://github.com/bitnami/charts/blob/main/bitnami/ghost/values.yaml
    global:
      # storageClass: "ceph-filesystem"
      storageClass: "longhorn"
    extraEnvVars:
      - name: LOG_LEVEL
        value: DEBUG
    image:
      registry: docker.io
      repository: bitnami/ghost
      tag: 5.53.2-debian-11-r0
      # debug: false
    ghostUsername: "chris"
    ghostEmail: "chris@mcclimans.net"
    ghostBlogTitle: "ABCS News"
    ghostEnableHttps: false
    ghostHost: "abcs.news"
    ghostPath: "/"
    existingSecret: "ghost-passwords"
    smtpHost: "smtp.fastmail.com"
    smtpPort: "465"
    smtpUser: "chris@mcclimans.net"
    smtpProtocol: "ssl"
    # smtpExistingSecret: "ghost-passwords"
    # ghostHost: "abcs.news"
    persistence:
      enabled: true
      # https://kubernetes.io/docs/concepts/storage/persistent-volumes/#access-modes
      accessModes:
        - "ReadWriteMany"
      size: 10Gi
    mysql:
      auth:
        existingSecret: "ghost-passwords"
      primary:
        persistence:
          enabled: true
          size: 20Gi
          # storageClass: ceph-filesystem
          storageClass: longhorn
          accessModes:
            - "ReadWriteMany"
    ingress:
      enabled: true
      hostname: "abcs.news"
      tls: false
      extraHosts: "ghost.abcs.news"
      ingressClassName: "nginx"
      secrets:
        - "abcs.news-tls"
    service:
      type: ClusterIP
