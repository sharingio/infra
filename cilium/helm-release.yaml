---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
# https://fluxcd.io/flux/components/helm/helmreleases/#specification
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.13.4"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 12h
  targetNamespace: longhorn
  storageNamespace: kube-system
  maxHistory: 10
  install:
    createNamespace: false
  # https://github.com/longhorn/charts/blob/v1.5.x/charts/longhorn/values.yaml
  values:
    # We bootstrap this before the cluster comes up,
    # but then import it into flux
    # https://github.com/fluxcd/flux2/discussions/2848
    k8sServiceHost: k8s.sharing.io
    k8sServicePort: 6443
    kubeProxyReplacement: strict
    policyEnforcementMode: "never"
    operator:
      replicas: 1
    gatewayAPI:
      enabled: true
    # Along with figuring out connectivity. fs
    ingressController:
      enabled: false
      service:
        # type: NodePort
        type: LoadBalancer
    hubble:
      enabled: true
      listenAddress: ":4244"
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
      relay:
        enabled: true
      ui:
        enabled: true
