---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ghost
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./ghost
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  patches:
    - patch: |
        - op: add
          path: /spec/values/extraEnvVars
          value:
            name: "ENV_HR"
            value: "yes"
        - op: add
          path: /spec/values/extraEnvVars
          value:
            name: "SETMYVAR"
            value: "MYVALUE"
      target:
        kind: HelmRelease
        name: ghost
      namespace: flux-system
    - patch: |
        - path: /spec/containers/0/env
          op: add
          value:
            name: "ENV_DEPLOYMENT"
            value: "YES"
        # - path: /spec/containers/0/env
        #   op: add
        #   value:
        #     name: "GHOST_ENABLE_HTTPS"
        #     value: "yes"
      target:
        kind: Deployment
        name: ghost
        namespace: ghost
